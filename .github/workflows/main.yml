name: Naver Cafe Bot

on:
  schedule:
    - cron: "0 * * * *"   # 매 시간 정각 실행 (UTC 기준)
  workflow_dispatch:        # 수동 실행 버튼

permissions:
  contents: write           # seen_posts.json 커밋을 위해 필요

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run bot
        run: python gonggibot.py

      - name: Commit seen_posts.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_posts.json
          git diff --cached --quiet || git commit -m "chore: update seen_posts.json"
          git push
