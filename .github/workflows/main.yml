name: Naver Cafe Bot

on:
  schedule:
    # 10분마다 실행 (GitHub 무료 서버의 안정적인 최소 간격입니다)
    - cron: '*/10 * * * *'
  workflow_dispatch:       # 버튼 눌러서 수동으로 즉시 실행하고 싶을 때 사용

jobs:
  build:
    runs-on: ubuntu-latest
    # 깃허브 액션이 내 파일을 수정하고 다시 저장할 수 있게 권한 부여
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run bot
        # 파일명을 gongibot.py로 수정했습니다.
        run: python gongibot.py

      - name: Commit and Push changes
        # 마지막으로 읽은 글 번호를 저장하기 위해 파일을 업데이트하고 저장소에 올립니다.
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add last_seen_article_id.txt
          git commit -m "Update last seen article ID" || exit 0
          git push
